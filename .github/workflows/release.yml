name: "publish"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles dmg"
            target: "aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin --bundles dmg"
            target: "x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: "--bundles appimage,deb,rpm"
            target: ""
          - platform: windows-latest
            args: "--bundles nsis"
            target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install additional rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: install dependencies (ubuntu only)
        if: runner.os == 'Linux'
        run: |
          # Linux dependencies for Tauri v2 builds.
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libayatana-appindicator3-dev rpm

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Qwerio ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          projectPath: .
          args: ${{ matrix.args }}
